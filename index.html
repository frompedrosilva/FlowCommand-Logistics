                                                <div className="text-[10px] uppercase font-bold text-slate-500">Wait Duration</div>
                                                <div className={`text-xl font-mono font-bold ${waitingDuration === '-' ? 'text-slate-600' : 'text-amber-400'}`}>{waitingDuration}</div>
                                            </div>
                                            <Icon name="Clock" size={24} className="text-amber-900/50"/>
                                        </div>
                                        <div className="bg-slate-900/50 border border-slate-800 p-3 rounded-xl flex items-center justify-between">
                                            <div>
                                                <div className="text-[10px] uppercase font-bold text-slate-500">Handling Time</div>
                                                <div className={`text-xl font-mono font-bold ${handlingDuration === '-' ? 'text-slate-600' : 'text-blue-400'}`}>{handlingDuration}</div>
                                            </div>
                                            <Icon name="Activity" size={24} className="text-blue-900/50"/>
                                        </div>
                                    </div>
                                )}

                                {/* 3. CANCELLED OR ACTION BUTTON */}
                                {isCancelled ? (
                                    <div className="p-4 rounded-xl bg-rose-950/20 border border-rose-900/50 flex flex-col gap-3">
                                        <div className="flex items-center gap-2 text-rose-500 font-bold border-b border-rose-900/30 pb-2">
                                            <Icon name="Alert" size={20}/> <span>Truck Cancelled</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 text-sm">
                                            <div>
                                                <span className="text-[10px] uppercase text-rose-400/70 font-bold block">Reason</span>
                                                <span className="text-white text-base font-medium">"{selectedTruck.cancellationReason || 'No reason provided'}"</span>
                                            </div>
                                            <div>
                                                <span className="text-[10px] uppercase text-rose-400/70 font-bold block">Type</span>
                                                <span className="text-white">{selectedTruck.cancellationType || 'N/A'}</span>
                                            </div>
                                            <div>
                                                <span className="text-[10px] uppercase text-rose-400/70 font-bold block">Cancelled Date</span>
                                                <span className="text-white font-mono">{safeDate(selectedTruck.cancellationTime)?.toLocaleString() || '-'}</span>
                                            </div>
                                            <div>
                                                <span className="text-[10px] uppercase text-rose-400/70 font-bold block">Operator</span>
                                                <span className="text-white">{selectedTruck.cancelledBy || 'Unknown'}</span>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    /* Normal Action Button */
                                    selectedTruck.status !== 'COMPLETED' && (
                                        <div className="w-full">
                                            {selectedTruck.status === 'PLANNED' && <button onClick={()=>handleQuickStatusUpdate('ARRIVED')} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-[0.98]"><Icon name="MapPin" size={24}/> Confirm Arrival</button>}
                                            {selectedTruck.status === 'ARRIVED' && <button onClick={()=>handleQuickStatusUpdate('WAITING')} className="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-[0.98]"><Icon name="Clock" size={24}/> Check-in Waiting</button>}
                                            {selectedTruck.status === 'WAITING' && (
                                                !hasDock && freeDocksCount === 0 ? (
                                                    <div className="w-full py-4 bg-rose-950/30 border border-rose-900/50 rounded-xl flex items-center justify-center gap-2 text-rose-400 font-bold">
                                                        <Icon name="Alert" size={24}/>
                                                        <span>No Docks Available - Cannot Assign</span>
                                                    </div>
                                                ) : (
                                                    <button onClick={()=>{ if(selectedTruck.dockId) handleQuickStatusUpdate('ASSIGNED'); else setShowDockSelector(true); }} 
                                                        className={`w-full py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-[0.98] ${selectedTruck.dockId ? 'bg-indigo-600 hover:bg-indigo-500 text-white' : 'bg-slate-800 text-slate-400 border-2 border-dashed border-slate-600 hover:border-slate-500 hover:text-white'}`}>
                                                        {selectedTruck.dockId ? <><Icon name="Anchor" size={24}/> Confirm Dock {activeDocks.find(d=>d.id===selectedTruck.dockId)?.name}</> : <><Icon name="Anchor" size={24}/> Assign Dock</>}
                                                    </button>
                                                )
                                            )}
                                            {selectedTruck.status === 'ASSIGNED' && <button onClick={()=>handleQuickStatusUpdate('HANDLING')} className="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-[0.98]"><Icon name="ArrowDownCircle" size={24}/> Start Operation</button>}
                                            {selectedTruck.status === 'HANDLING' && <button onClick={()=>handleQuickStatusUpdate('COMPLETED')} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-[0.98]"><Icon name="CheckCircle" size={24}/> Finish & Release</button>}
                                        </div>
                                    )
                                )}

                                {/* 4. INFO CARDS GRID */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    
                                    {/* Cargo Card */}
                                    <div className={`glass p-4 rounded-xl border border-slate-700 space-y-3 ${isCancelled ? 'opacity-75' : ''}`}>
                                        <div className="flex items-center justify-between border-b border-slate-700 pb-2">
                                            <div className="flex items-center gap-2"><Icon name="Box" className="text-blue-400"/><span className="font-bold text-slate-300 uppercase text-xs">Cargo</span></div>
                                            {!isCancelled && <button onClick={()=>setEditingSection('CARGO')} className="text-slate-500 hover:text-blue-400 p-1"><Icon name="Edit" size={16}/></button>}
                                        </div>
                                        <div className="grid grid-cols-2 gap-y-3 gap-x-2 text-sm">
                                            <div><span className="block text-[10px] text-slate-500 font-bold uppercase">Type</span><TypeIcon type={selectedTruck.type} /></div>
                                            <div><span className="block text-[10px] text-slate-500 font-bold uppercase">Trailer</span><span className="text-white font-mono">{selectedTruck.trailerPlate || '-'}</span></div>
                                            <div className="col-span-2"><span className="block text-[10px] text-slate-500 font-bold uppercase">Description</span><span className="text-white">{selectedTruck.cargoDescription || 'No description'}</span></div>
                                            <div><span className="block text-[10px] text-slate-500 font-bold uppercase">Qty</span><span className="text-white">{selectedTruck.cargoQty || '-'}</span></div>
                                            <div><span className="block text-[10px] text-slate-500 font-bold uppercase">Weight</span><span className="text-white">{selectedTruck.cargoWeight || '-'}</span></div>
                                            {selectedTruck.cargoNotes && <div className="col-span-2 bg-amber-900/20 p-2 rounded border border-amber-900/30 text-xs italic text-amber-100">{selectedTruck.cargoNotes}</div>}
                                        </div>
                                    </div>

                                    {/* Dock Card - DISABLED/NA IF CANCELLED/COMPLETED/HANDLING */}
                                    <div className={`glass p-4 rounded-xl border border-slate-700 space-y-3 flex flex-col ${isCancelled ? 'opacity-50' : ''}`}>
                                        <div className="flex items-center justify-between border-b border-slate-700 pb-2">
                                            <div className="flex items-center gap-2"><Icon name="Anchor" className={isCancelled ? "text-slate-500" : "text-emerald-400"}/><span className="font-bold text-slate-300 uppercase text-xs">Dock</span></div>
                                            {canEditDock && <button onClick={()=>setShowDockSelector(true)} className="text-slate-500 hover:text-blue-400 p-1"><Icon name="Edit" size={16}/></button>}
                                        </div>
                                        <div className="flex-1 flex flex-col items-center justify-center p-3 bg-slate-900/50 rounded-lg border border-slate-800 min-h-[100px]">
                                            {isCancelled ? (
                                                <div className="text-slate-500 italic flex flex-col items-center gap-2 text-xs">
                                                    <Icon name="X" size={24} className="opacity-50"/>
                                                    <span>Not Applicable</span>
                                                </div>
                                            ) : selectedTruck.dockId ? (
                                                <><div className="text-3xl font-bold text-white mb-1">{assignedDock?.name || selectedTruck.dockId}</div><StatusBadge status={dockStatusDisplay} /></>
                                            ) : (
                                                selectedTruck.status === 'COMPLETED' ? (
                                                    <div className="text-center"><span className="text-slate-500 text-xs uppercase block mb-1">Completed at</span><span className="text-emerald-400 font-bold text-xl">{selectedTruck.historyDock || 'Unknown Dock'}</span></div>
                                                ) : (<div className="text-slate-500 italic flex flex-col items-center gap-2 text-xs"><Icon name="Alert" size={24} className="opacity-50"/><span>No Dock Assigned</span></div>)
                                            )}
                                        </div>
                                    </div>

                                    {/* Driver Card */}
                                    <div className={`glass p-4 rounded-xl border border-slate-700 space-y-3 ${isCancelled ? 'opacity-75' : ''}`}>
                                        <div className="flex items-center justify-between border-b border-slate-700 pb-2">
                                            <div className="flex items-center gap-2"><Icon name="User" className="text-slate-400"/><span className="font-bold text-slate-300 uppercase text-xs">Driver</span></div>
                                            {!isCancelled && <button onClick={()=>setEditingSection('DRIVER')} className="text-slate-500 hover:text-blue-400 p-1"><Icon name="Edit" size={16}/></button>}
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex justify-between"><span className="text-slate-500 text-[10px] uppercase font-bold">Name</span><span className="text-white text-sm font-bold">{selectedTruck.driverName || '-'}</span></div>
                                            <div className="flex justify-between items-center"><span className="text-slate-500 text-[10px] uppercase font-bold">Phone</span><span className="text-blue-400 font-mono text-sm">{selectedTruck.driverPhone || '-'}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-500 text-[10px] uppercase font-bold">Language</span><span className="text-white text-sm">{selectedTruck.driverLanguage || 'N/A'}</span></div>
                                        </div>
                                    </div>

                                    {/* History Log Card */}
                                    <div className="glass p-4 rounded-xl border border-slate-700 space-y-3 md:col-span-2">
                                        <div className="flex items-center gap-2 border-b border-slate-700 pb-2">
                                            <Icon name="Clock" className="text-slate-400"/>
                                            <span className="font-bold text-slate-300 uppercase text-xs">Full History Log</span>
                                        </div>
                                        <div className="space-y-3 text-sm max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                                            {selectedTruck.history && selectedTruck.history.slice().reverse().map((h, i) => (
                                                <div key={i} className="flex gap-3">
                                                    <div className="flex flex-col items-center pt-1">
                                                        <div className="w-2 h-2 rounded-full bg-slate-600"></div>
                                                        {i < selectedTruck.history.length - 1 && <div className="w-px h-full bg-slate-800 my-1"></div>}
                                                    </div>
                                                    <div className="pb-2 w-full">
                                                        <div className="text-white text-xs font-medium">{h.action}</div>
                                                        <div className="text-[10px] text-slate-500 flex justify-between mt-0.5">
                                                            <span>{safeDate(h.timestamp)?.toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                                                            <span className="text-slate-600 italic">by {h.user}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {(!selectedTruck.history || selectedTruck.history.length === 0) && <div className="text-slate-500 italic text-xs text-center py-2">No history recorded.</div>}
                                        </div>
                                    </div>
                                </div>

                                {/* General Notes Section */}
                                <div className={`glass p-4 rounded-xl border border-slate-700 ${isCancelled ? 'opacity-75' : ''}`}>
                                    <div className="flex items-center justify-between border-b border-slate-700 pb-2 mb-3">
                                        <div className="flex items-center gap-2"><Icon name="FileText" className="text-slate-400"/><span className="font-bold text-slate-300 uppercase text-xs">General Notes & Details</span></div>
                                        {!isCancelled && <button onClick={()=>setEditingSection('DETAILS')} className="text-slate-500 hover:text-blue-400 p-1"><Icon name="Edit" size={16}/></button>}
                                    </div>
                                    <p className="text-slate-300 whitespace-pre-line text-sm">{selectedTruck.notes || 'No notes.'}</p>
                                    <div className="mt-3 text-xs text-slate-500 font-mono">ETA: {selectedTruck.eta ? safeDate(selectedTruck.eta).toLocaleString() : 'N/A'}</div>
                                </div>
                                
                                {selectedTruck.status !== 'COMPLETED' && !isCancelled && (
                                    <div className="mt-4 pt-4 border-t border-slate-800">
                                         <button onClick={()=>setShowCancellationModal(true)} className="w-full py-3 text-rose-400 hover:bg-rose-950/30 border border-rose-900/30 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors">
                                             <Icon name="X" size={18}/> Cancel Process
                                         </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderEditModal = () => {
                if (!editingSection) return null;
                const isCargo = editingSection === 'CARGO';
                const isDriver = editingSection === 'DRIVER';
                const isDetails = editingSection === 'DETAILS';
                const freeDocksCount = activeDocks.filter(d => d.status === 'FREE' && !activeTrucks.some(t => t.dockId === d.id && t.id !== selectedTruck.id)).length;
                
                const handleSubmit = (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const formData = new FormData(form);
                    const updates = {};
                    formData.forEach((value, key) => updates[key] = value);
                    if (isDriver) updates.isFrequentDriver = form.querySelector('[name="isFrequentDriver"]').checked;
                    
                    const newTruck = { ...selectedTruck, ...updates };
                    api.saveTruck(newTruck).then(() => {
                        setSelectedTruck(newTruck);
                        setEditingSection(null);
                        loadData();
                    });
                };

                return (
                    <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/90 backdrop-blur-sm animate-fade-in p-4" onClick={() => setEditingSection(null)}>
                        <div className="glass w-full max-w-lg rounded-xl border border-slate-700 shadow-2xl p-6 animate-slide-in" onClick={e => e.stopPropagation()}>
                            <h3 className="text-xl font-bold text-white mb-4 flex items-center gap-2">
                                <Icon name="Edit" className="text-blue-500"/> Edit {isCargo ? 'Cargo' : isDriver ? 'Driver' : 'Details'}
                            </h3>
                            {isDetails && freeDocksCount === 0 && (
                                <div className="mb-4 p-3 bg-rose-950/50 border border-rose-900 text-rose-300 text-sm rounded flex items-center gap-2">
                                    <Icon name="Alert" size={16}/> Warning: No free docks available.
                                </div>
                            )}
                            <form onSubmit={handleSubmit} className="space-y-4">
                                {isCargo && (
                                    <>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Trailer</label><input name="trailerPlate" defaultValue={selectedTruck.trailerPlate} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"/></div>
                                            <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Type</label><select name="cargoType" defaultValue={selectedTruck.cargoType} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"><option value="PALLETS">Pallets</option><option value="CONTAINER">Container</option><option value="LOOSE">Loose</option></select></div>
                                        </div>
                                        <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Description</label><input name="cargoDescription" defaultValue={selectedTruck.cargoDescription} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"/></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Qty</label><input name="cargoQty" defaultValue={selectedTruck.cargoQty} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"/></div>
                                            <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Weight</label><input name="cargoWeight" defaultValue={selectedTruck.cargoWeight} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"/></div>
                                        </div>
                                        <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Notes</label><input name="cargoNotes" defaultValue={selectedTruck.cargoNotes} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"/></div>
                                    </>
                                )}
                                {isDriver && (
                                    <>
                                        <div>
                                            <label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Name</label>
                                            <input 
                                                name="driverName" 
                                                defaultValue={selectedTruck.driverName} 
                                                className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"
                                                list="edit-driver-list"
                                                onChange={(e) => {
                                                    const val = e.target.value;
                                                    const found = savedDrivers.find(d => d.name === val);
                                                    if (found && e.target.form) {
                                                        const form = e.target.form;
                                                        if(form.elements['driverPhone']) form.elements['driverPhone'].value = found.phone || '';
                                                        if(form.elements['driverLanguage']) form.elements['driverLanguage'].value = found.language || 'N/A';
                                                        if(form.elements['isFrequentDriver']) form.elements['isFrequentDriver'].checked = true;
                                                    }
                                                }}
                                            />
                                            <datalist id="edit-driver-list">
                                                {savedDrivers.map(d => <option key={d.id} value={d.name}>{d.phone}</option>)}
                                            </datalist>
                                        </div>
                                        <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Phone</label><input name="driverPhone" defaultValue={selectedTruck.driverPhone} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"/></div>
                                        <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Language</label><select name="driverLanguage" defaultValue={selectedTruck.driverLanguage} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white"><option value="English">English</option><option value="Spanish">Spanish</option><option value="Portuguese">Portuguese</option><option value="Other">Other</option></select></div>
                                        <label className="flex items-center gap-2"><input type="checkbox" name="isFrequentDriver" defaultChecked={selectedTruck.isFrequentDriver} className="w-4 h-4"/><span className="text-sm text-slate-300">Frequent Driver</span></label>
                                    </>
                                )}
                                {isDetails && (
                                    <>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Plate</label><input name="plate" defaultValue={selectedTruck.plate} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white uppercase"/></div>
                                            <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Carrier</label><input name="carrier" defaultValue={selectedTruck.carrier} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white uppercase"/></div>
                                        </div>
                                        <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">ETA</label><input type="datetime-local" name="eta" defaultValue={selectedTruck.eta} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:border-blue-500 outline-none" /></div>
                                        
                                        {/* Added Timestamp Editing */}
                                        <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Actual Arrival</label><input type="datetime-local" name="actualArrival" defaultValue={selectedTruck.actualArrival} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:border-blue-500 outline-none" /></div>
                                        {(selectedTruck.status === 'HANDLING' || selectedTruck.status === 'COMPLETED') && (
                                            <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">Handling Start</label><input type="datetime-local" name="handlingStartTime" defaultValue={selectedTruck.handlingStartTime} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:border-blue-500 outline-none" /></div>
                                        )}

                                        <div><label className="text-xs uppercase font-bold text-slate-500 mb-2 block">General Notes</label><textarea name="notes" defaultValue={selectedTruck.notes} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white" rows="3"></textarea></div>
                                    </>
                                )}
                                <div className="flex gap-3 pt-4">
                                    <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg">Save</button>
                                    <button type="button" onClick={()=>setEditingSection(null)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-lg">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };

            const renderContent = () => {
                if (tab === 'SETTINGS') return <SettingsView user={user} onUpdateUser={onUpdateUser} />;
                if (tab === 'DRIVERS') return <DriversView drivers={savedDrivers} loadDrivers={loadDrivers} />;
                if (tab === 'USERS') {
                    const isAdmin = user.role === 'Admin';
                    return (
                        <div className="space-y-6 animate-fade-in max-w-5xl mx-auto">
                            <div className="flex justify-between items-center">
                                <div><h2 className="text-2xl font-bold">Team Management</h2><p className="opacity-70 text-sm">Manage access and roles</p></div>
                                {isAdmin && <button onClick={()=>{setEditingUser(null); setUserModalOpen(true);}} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2"><Icon name="Plus" size={18}/> Add User</button>}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {users.map(u => (
                                    <div key={u.id} className="glass p-4 rounded-xl border border-slate-700 flex items-center gap-4 hover:bg-slate-800/50 transition-colors group relative">
                                        <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center text-lg font-bold opacity-70 border border-slate-600 overflow-hidden">{u.avatarUrl ? <img src={u.avatarUrl} className="w-full h-full object-cover"/> : u.name.charAt(0)}</div>
                                        <div className="flex-1"><div className="font-bold">{u.name}</div><div className="text-xs opacity-70 uppercase font-bold">{u.role}</div><div className="text-xs opacity-50 mt-0.5">{u.email}</div></div>
                                        {isAdmin && (<div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2"><button onClick={()=>{setEditingUser(u); setUserModalOpen(true);}} className="p-1.5 bg-blue-900/50 text-blue-400 rounded hover:bg-blue-900"><Icon name="Edit" size={14}/></button>{user.id !== u.id && <button onClick={()=>handleUserDelete(u)} className="p-1.5 bg-rose-900/50 text-rose-400 rounded hover:bg-rose-900"><Icon name="Trash" size={14}/></button>}</div>)}
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                if (tab === 'DOCKS') {
                    return (
                        <div className="space-y-6 animate-fade-in">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div className="flex items-center gap-2 overflow-x-auto pb-2 md:pb-0 scrollbar-hide">
                                    {['ALL', 'FREE', 'OCCUPIED', 'BLOCKED', 'MAINTENANCE'].map(f => (
                                        <button key={f} onClick={()=>setDockFilter(f)} className={`px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all whitespace-nowrap ${dockFilter===f ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{f}</button>
                                    ))}
                                </div>
                                <div className="flex gap-2 w-full md:w-auto">
                                    <div className="relative flex-1 md:w-64">
                                        <div className="absolute left-3 top-2.5 text-slate-500"><Icon name="Search" size={18}/></div>
                                        <input className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-10 pr-4 text-sm text-white focus:border-blue-500 outline-none" placeholder="Search docks..." value={dockSearch} onChange={e=>setDockSearch(e.target.value)} />
                                    </div>
                                    {user.role === 'Admin' && <button onClick={handleAddDock} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow-lg shadow-emerald-900/20"><Icon name="Plus" size={18}/><span className="hidden sm:inline">Add Dock</span></button>}
                                </div>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                                {filteredDocks.map(d => {
                                    const truck = activeTrucks.find(t => t.dockId === d.id && !t.hidden && t.status !== 'CANCELLED');
                                    return (
                                        <div key={d.id} onClick={()=>handleDockClick(d)} className={`glass p-4 rounded-xl border relative group cursor-pointer hover:scale-[1.02] transition-all flex flex-col justify-between min-h-[140px] ${d.status==='FREE' && !truck ? 'border-emerald-500/30 hover:border-emerald-500' : d.status==='BLOCKED' ? 'border-rose-500/30 bg-rose-950/10' : d.status==='MAINTENANCE' ? 'border-orange-500/30 bg-orange-950/10' : 'border-blue-500/30 hover:border-blue-500'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="text-xl font-bold text-white">{d.name}</span>
                                                <StatusBadge status={truck ? truck.status : d.status} />
                                            </div>
                                            <div className="text-xs text-slate-500 font-bold uppercase mb-4">{d.type}</div>
                                            {truck ? (
                                                <div className="mt-auto bg-slate-800/50 p-2 rounded border border-slate-700/50">
                                                    <div className="text-white font-mono text-sm font-bold flex items-center justify-between">{truck.plate} <TypeIcon type={truck.type}/></div>
                                                    <div className="text-[10px] text-slate-400 truncate">{truck.carrier}</div>
                                                </div>
                                            ) : d.status === 'FREE' ? (
                                                <div className="mt-auto text-emerald-500 text-xs font-bold flex items-center gap-1"><Icon name="CheckCircle" size={14}/> Available</div>
                                            ) : (
                                                <div className="mt-auto text-slate-500 text-xs italic">
                                                    {d.notes || 'No details'}
                                                    {d.status === 'MAINTENANCE' && d.reopenDate && (
                                                        <div className="mt-1.5 pt-1.5 border-t border-slate-700/50 text-orange-400 font-mono text-[10px]">
                                                            <span className="block opacity-70 uppercase">Reopening:</span>
                                                            {safeDate(d.reopenDate)?.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                }

                if (tab === 'FLEET') {
                    return (
                        <div className="space-y-4 animate-fade-in">
                            <div className="flex flex-col md:flex-row gap-4 justify-between bg-slate-900/50 p-4 rounded-xl border border-slate-800 sticky top-0 z-30 backdrop-blur-xl">
                                <div className="flex gap-2 overflow-x-auto pb-1 md:pb-0 scrollbar-hide">
                                    {['ALL', 'URGENT', 'WAITING', 'PLANNED', 'TODAY'].map(m => (
                                        <button key={m} onClick={()=>setFilterMode(m)} className={`px-4 py-2 rounded-lg text-xs font-bold uppercase transition-all whitespace-nowrap ${filterMode===m ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{m}</button>
                                    ))}
                                </div>
                                <div className="relative w-full md:w-64">
                                    <div className="absolute left-3 top-2.5 text-slate-500"><Icon name="Search" size={18}/></div>
                                    <input className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-10 pr-4 text-sm text-white focus:border-blue-500 outline-none" placeholder="Search plate, carrier..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                                </div>
                            </div>
                            <div className="hidden md:grid grid-cols-12 gap-4 px-4 py-2 text-[10px] uppercase font-bold text-slate-500">
                                <div className="col-span-2">Truck / Carrier</div>
                                <div className="col-span-1">Type</div>
                                <div className="col-span-2">Status</div>
                                <div className="col-span-2">Location/Dock</div>
                                <div className="col-span-2">Timings</div>
                                <div className="col-span-2">Wait Time</div>
                                <div className="col-span-1 text-right">Action</div>
                            </div>
                            <div className="space-y-2">
                                {sortedTrucks.length === 0 ? <div className="text-center py-12 text-slate-500">No trucks found matching criteria.</div> : 
                                sortedTrucks.map(t => {
                                    const isCancelled = t.status === 'CANCELLED';
                                    const isCompleted = t.status === 'COMPLETED';
                                    const isUrgent = t.priority === 'URGENT';
                                    return (
                                        <div key={t.id} onClick={()=>setSelectedTruck(t)} className={`glass p-4 md:py-3 md:px-4 rounded-xl border ${isCompleted ? 'border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.2)] bg-emerald-950/10' : isUrgent ? 'border-rose-500 shadow-[0_0_15px_rgba(244,63,94,0.3)] bg-rose-950/10' : 'border-slate-800'} hover:border-blue-500/50 cursor-pointer transition-all hover:bg-slate-800/30 group ${isCancelled ? 'line-through opacity-50 grayscale bg-slate-900/20' : ''}`}>
                                            <div className="flex flex-col md:grid md:grid-cols-12 md:gap-4 md:items-center">
                                                <div className="col-span-2 flex items-center justify-between md:justify-start gap-3 mb-2 md:mb-0">
                                                    <div>
                                                        <div className="font-bold text-white font-mono text-lg md:text-base">{t.plate}</div>
                                                        <div className="text-xs text-slate-400 truncate max-w-[120px]">{t.carrier}</div>
                                                    </div>
                                                    <div className="md:hidden"><StatusBadge status={t.status} /></div>
                                                </div>
                                                <div className="col-span-1 hidden md:block"><TypeIcon type={t.type}/></div>
                                                <div className="col-span-2 hidden md:block"><StatusBadge status={t.status} /></div>
                                                <div className="col-span-2 mb-2 md:mb-0 flex items-center gap-2">
                                                    {t.dockId ? (
                                                        <div className="flex items-center gap-2 text-emerald-400"><Icon name="Anchor" size={16}/><span className="font-bold">{activeDocks.find(d=>d.id===t.dockId)?.name || t.dockId}</span></div>
                                                    ) : (
                                                        (t.status === 'COMPLETED' || t.status === 'CANCELLED') && t.historyDock ? (
                                                            <div className="flex items-center gap-2 text-slate-500"><Icon name="Anchor" size={16}/><span className="font-bold text-xs">Used: {t.historyDock}</span></div>
                                                        ) : (
                                                            <span className="text-slate-600 text-xs italic">Unassigned</span>
                                                        )
                                                    )}
                                                </div>
                                                <div className="col-span-2 text-xs text-slate-400 mb-2 md:mb-0">
                                                    {t.actualArrival ? 
                                                        <div><span className="text-emerald-500">Arr:</span> {safeDate(t.actualArrival).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div> : 
                                                        <div><span className="text-blue-500">ETA:</span> {t.eta ? safeDate(t.eta).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '--'}</div>
                                                    }
                                                </div>
                                                <div className="col-span-2 text-xs font-mono text-slate-300">
                                                    {t.status === 'WAITING' ? <span className="text-amber-400">{getDuration(t.actualArrival)}</span> : 
                                                     t.status === 'HANDLING' ? <span className="text-blue-400">{getDuration(t.handlingStartTime)}</span> : '-'}
                                                </div>
                                                <div className="col-span-1 text-right hidden md:block text-slate-500 group-hover:text-blue-400"><Icon name="ChevronLeft" className="rotate-180" size={18}/></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                }

                // Default DASHBOARD
                const plannedTrucks = activeTrucks.filter(t => t.status === 'PLANNED' && !t.hidden).sort((a,b) => (safeDate(a.eta)||0) - (safeDate(b.eta)||0)).slice(0, 5);

                return (
                    <div className="space-y-6 animate-fade-in">
                        {/* Stats Row */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <StatCard label="Free Docks" value={dockStats.free} icon="Anchor" color="emerald" onClick={()=>setTab('DOCKS')} />
                            <StatCard label="Waiting" value={activeTrucks.filter(t=>t.status==='WAITING').length} icon="Clock" color="amber" onClick={()=>handleStatClick('WAITING')} />
                            <StatCard label="In Progress" value={activeTrucks.filter(t=>t.status==='HANDLING').length} icon="Activity" color="blue" onClick={()=>handleStatClick('ALL')} />
                            <StatCard label="Urgent" value={activeTrucks.filter(t=>t.priority==='URGENT' || t.status==='DELAYED').length} icon="Alert" color="rose" onClick={()=>handleStatClick('URGENT')} />
                        </div>

                        {/* Main Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Left Col: Urgent/Attention + Arrivals */}
                            <div className="lg:col-span-2 space-y-6">
                                {/* Urgent */}
                                <div className="glass rounded-xl border border-slate-700 overflow-hidden">
                                    <div className="p-4 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
                                        <h3 className="font-bold text-white flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></div> Urgent Attention</h3>
                                        <button onClick={()=>handleStatClick('URGENT')} className="text-xs text-blue-400 font-bold hover:text-blue-300">VIEW ALL</button>
                                    </div>
                                    <div className="divide-y divide-slate-800">
                                        {urgentTrucks.length === 0 ? <div className="p-8 text-center text-slate-500 italic">No urgent issues detected. Smooth sailing!</div> : 
                                        urgentTrucks.slice(0, 5).map(t => (
                                            <div key={t.id} onClick={()=>setSelectedTruck(t)} className="p-4 hover:bg-slate-800/50 cursor-pointer transition-colors flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 rounded bg-slate-800 flex items-center justify-center font-bold text-white font-mono">{t.plate.substring(0,3)}</div>
                                                    <div>
                                                        <div className="font-bold text-white flex items-center gap-2">{t.plate} <span className="text-[10px] bg-slate-800 px-1 rounded text-slate-400">{t.carrier}</span></div>
                                                        <div className="text-xs text-rose-400 font-bold mt-0.5 flex items-center gap-1">
                                                            {t.status === 'DELAYED' ? `Delayed by ${getDelayDuration(t.eta)}` : `Urgent Priority`}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <StatusBadge status={t.status} />
                                                    <div className="text-[10px] text-slate-500 mt-1">{t.dockId ? `Dock ${activeDocks.find(d=>d.id===t.dockId)?.name}` : 'No Dock'}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Planned Arrivals (New Section) */}
                                <div className="glass rounded-xl border border-slate-700 overflow-hidden">
                                    <div className="p-4 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
                                        <h3 className="font-bold text-white flex items-center gap-2"><Icon name="Calendar" size={18} className="text-indigo-500"/> Planned Arrivals</h3>
                                        <button onClick={()=>handleStatClick('PLANNED')} className="text-xs text-blue-400 font-bold hover:text-blue-300">VIEW ALL</button>
                                    </div>
                                    <div className="divide-y divide-slate-800">
                                        {plannedTrucks.length === 0 ? <div className="p-6 text-center text-slate-500 text-sm">No planned trucks coming up.</div> : 
                                        plannedTrucks.map(t => (
                                            <div key={t.id} onClick={()=>setSelectedTruck(t)} className="p-3 hover:bg-slate-800/50 cursor-pointer transition-colors flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-1 h-8 rounded-full bg-slate-600`}></div>
                                                    <div>
                                                        <div className="font-bold text-white text-sm">{t.plate} <span className="text-[10px] text-slate-500 font-normal ml-1">{t.carrier}</span></div>
                                                        <div className="text-xs text-indigo-400 font-medium">ETA: {t.eta ? safeDate(t.eta).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : 'TBD'}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <TypeIcon type={t.type}/>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Recent Arrivals */}
                                <div className="glass rounded-xl border border-slate-700 overflow-hidden">
                                    <div className="p-4 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
                                        <h3 className="font-bold text-white flex items-center gap-2"><Icon name="Truck" size={18} className="text-blue-500"/> Recent Arrivals</h3>
                                        <button onClick={()=>handleStatClick('ALL')} className="text-xs text-blue-400 font-bold hover:text-blue-300">VIEW ALL</button>
                                    </div>
                                    <div className="divide-y divide-slate-800">
                                        {sortedTrucks.filter(t=>t.status==='ARRIVED' || t.status==='WAITING').slice(0, 5).map(t => (
                                            <div key={t.id} onClick={()=>setSelectedTruck(t)} className="p-3 hover:bg-slate-800/50 cursor-pointer transition-colors flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-2 h-10 rounded-full ${t.type==='INBOUND'?'bg-emerald-500':'bg-blue-500'}`}></div>
                                                    <div>
                                                        <div className="font-bold text-white text-sm">{t.plate}</div>
                                                        <div className="text-xs text-slate-500">{t.carrier}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-white font-mono text-sm">{getDuration(t.actualArrival)}</div>
                                                    <div className="text-[10px] text-slate-500">Wait Time</div>
                                                </div>
                                            </div>
                                        ))}
                                        {sortedTrucks.filter(t=>t.status==='ARRIVED' || t.status==='WAITING').length === 0 && <div className="p-6 text-center text-slate-500 text-sm">No trucks currently waiting.</div>}
                                    </div>
                                </div>
                            </div>

                            {/* Right Col: Dock Overview */}
                            <div className="glass rounded-xl border border-slate-700 overflow-hidden flex flex-col h-full max-h-[600px]">
                                <div className="p-4 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
                                    <h3 className="font-bold text-white flex items-center gap-2"><Icon name="Anchor" size={18} className="text-emerald-500"/> Dock Overview</h3>
                                    <button onClick={()=>setTab('DOCKS')} className="text-xs text-blue-400 font-bold hover:text-blue-300">MAP</button>
                                </div>
                                <div className="overflow-y-auto flex-1 p-2 space-y-2 custom-scrollbar">
                                    {dashboardDocks.map(d => {
                                        const truck = activeTrucks.find(t => t.dockId === d.id && !t.hidden && t.status !== 'CANCELLED');
                                        return (
                                            <div key={d.id} onClick={()=>handleDockClick(d)} className={`p-3 rounded-lg border flex items-center justify-between cursor-pointer hover:bg-slate-800 transition-colors ${d.status==='FREE' && !truck ? 'border-emerald-900/50 bg-emerald-950/10' : 'border-slate-800 bg-slate-900/30'}`}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-8 h-8 rounded flex items-center justify-center font-bold text-xs ${d.status==='FREE' && !truck ? 'bg-emerald-900 text-emerald-400' : 'bg-slate-800 text-slate-400'}`}>{d.name.replace('Dock ','')}</div>
                                                    <div>
                                                        <div className="font-bold text-white text-sm">{d.name}</div>
                                                        <div className="text-[10px] text-slate-500 uppercase">{d.type}</div>
                                                    </div>
                                                </div>
                                                <div>
                                                    {truck ? <div className="text-right"><div className="text-white font-mono text-xs font-bold">{truck.plate}</div><StatusBadge status={truck.status}/></div> : 
                                                     d.status !== 'FREE' ? <StatusBadge status={d.status} /> : <div className="text-xs font-bold text-emerald-500">OPEN</div>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex h-screen bg-slate-950 text-slate-200 overflow-hidden font-sans">
                    {/* Sidebar */}
                    <aside className="hidden lg:flex w-64 bg-slate-950 border-r border-slate-800 flex-col z-50">
                        <div className="h-16 flex items-center px-6 border-b border-slate-800">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-900/20"><Icon name="Activity" size={20} /></div>
                            <span className="ml-3 font-bold text-white text-lg tracking-tight">FlowCommand</span>
                        </div>
                        <nav className="flex-1 p-3 space-y-2 mt-4">
                            {[ { id:'DASHBOARD', i:'Layout', l:'Dashboard' }, { id:'FLEET', i:'Truck', l:'Fleet Control' }, { id:'DOCKS', i:'Anchor', l:'Dock Map' }, { id:'USERS', i:'Users', l:'Team' }, { id:'SETTINGS', i:'Settings', l:'Settings' } ].map(n => (
                                <button key={n.id} onClick={()=>setTab(n.id)} className={`w-full flex items-center p-3 rounded-xl transition-all ${tab===n.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20 font-bold' : 'text-slate-400 hover:bg-slate-900 hover:text-white font-medium'}`}>
                                    <Icon name={n.i} size={20}/><span className="ml-3">{n.l}</span>
                                </button>
                            ))}
                        </nav>
                        {/* Profile Section - Updated with onClick */}
                        <div className="p-4 border-t border-slate-800">
                            <div 
                                onClick={() => setTab('SETTINGS')}
                                className="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-colors cursor-pointer group"
                            >
                                <div className="w-10 h-10 rounded-full bg-slate-700 border-2 border-slate-600 group-hover:border-blue-500 transition-colors flex items-center justify-center overflow-hidden">
                                    {user.avatarUrl ? <img src={user.avatarUrl} className="w-full h-full object-cover" /> : <span className="font-bold text-slate-400">{user.name.charAt(0)}</span>}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="text-sm font-bold text-white truncate group-hover:text-blue-400 transition-colors">{user.name}</div>
                                    <div className="text-xs text-slate-500 truncate">{user.role}</div>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); onLogout(); }} className="p-2 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-colors" title="Logout">
                                    <Icon name="LogOut" size={18} />
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* Mobile Bottom Nav */}
                    <nav className="lg:hidden fixed bottom-0 left-0 right-0 h-20 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 flex items-center justify-around z-40 pb-safe px-2">
                         {[ { id:'DASHBOARD', i:'Layout', l:'Home' }, { id:'FLEET', i:'Truck', l:'Fleet' }, { id:'DOCKS', i:'Anchor', l:'Docks' }, { id:'SETTINGS', i:'Settings', l:'More' } ].map(n => (
                            <button key={n.id} onClick={()=>setTab(n.id)} className={`flex flex-col items-center justify-center w-16 h-16 rounded-xl transition-all ${tab===n.id ? 'text-blue-400' : 'text-slate-500'}`}>
                                <div className={`p-1.5 rounded-xl mb-1 ${tab===n.id ? 'bg-blue-900/20' : ''}`}><Icon name={n.i} size={24}/></div>
                                <span className="text-[10px] font-bold">{n.l}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 flex flex-col relative overflow-hidden bg-slate-950">
                        <header className="h-16 border-b border-slate-800 flex items-center justify-between px-4 md:px-8 bg-slate-950/80 backdrop-blur z-20 shrink-0">
                            <div className="lg:hidden flex items-center gap-2">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white"><Icon name="Activity" size={18} /></div>
                                <span className="font-bold text-white tracking-tight">FlowCommand</span>
                            </div>
                            <div className="hidden lg:block text-xs font-bold text-slate-500 uppercase tracking-widest">{tab.replace('_', ' ')}</div>
                            <div className="flex items-center gap-4">
                                <Clock />
                                <button onClick={handleRefresh} className={`p-2.5 text-slate-400 hover:text-white bg-slate-900 rounded-lg border border-slate-800 transition-all active:scale-95 ${isRefreshing ? 'animate-spin text-blue-400' : ''}`}><Icon name="RefreshCw" size={18}/></button>
                                <button onClick={handleRegisterOpen} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg shadow-blue-900/20 flex items-center gap-2"><Icon name="Plus" size={16}/> <span className="hidden md:inline">New Arrival</span></button>
                            </div>
                        </header>
                        
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth pb-24 md:pb-8 relative">
                            {renderContent()}
                        </div>
                        
                        {/* Toast Notification */}
                        {refreshToast && (
                            <div className="absolute top-20 right-8 bg-emerald-900/80 border border-emerald-500/30 text-emerald-100 px-4 py-2 rounded-lg shadow-xl backdrop-blur animate-fade-in flex items-center gap-2 z-50">
                                <Icon name="CheckCircle" size={16} className="text-emerald-400"/> {refreshToast}
                            </div>
                        )}
                        {registrationSuccess && (
                            <div className="absolute top-20 right-8 bg-emerald-900/80 border border-emerald-500/30 text-emerald-100 px-4 py-3 rounded-lg shadow-xl backdrop-blur animate-fade-in flex items-center gap-2 z-50 max-w-sm">
                                <Icon name="CheckCircle" size={20} className="text-emerald-400 shrink-0"/> 
                                <div>
                                    <div className="font-bold">Success</div>
                                    <div className="text-xs opacity-90">{registrationSuccess}</div>
                                </div>
                                <button onClick={()=>setRegistrationSuccess(null)} className="ml-2 hover:bg-emerald-800 rounded p-1"><Icon name="X" size={14}/></button>
                            </div>
                        )}

                        {/* Modals */}
                        {renderArrivalModal()}
                        {renderTruckModal()}
                        {renderDockModal()}
                        {renderEditModal()}
                        {renderDockSelectorModal()}
                        {userModalOpen && <UserModal user={editingUser} onClose={()=>setUserModalOpen(false)} onSave={()=>{setUserModalOpen(false); loadUsers();}} />}
                        {confirmModal && <ConfirmationModal {...confirmModal} onCancel={()=>setConfirmModal(null)} />}
                        {alertModal && <AlertModal {...alertModal} onClose={()=>setAlertModal(null)} />}
                        {showDockConfigModal && <DockStatusConfigModal status={dockForm.status} onConfirm={handleDockConfigConfirm} onCancel={()=>{setShowDockConfigModal(false); setShowDockModal(true);}} />}
                        {showCancellationModal && <CancellationModal onConfirm={handleCancellationConfirm} onCancel={()=>setShowCancellationModal(false)} />}
                    </main>
                </div>
            );
        };

        const App = () => {
             const [user, setUser] = useState(null);
             const [loading, setLoading] = useState(true);

             useEffect(() => {
                 api.checkSession().then(u => {
                     if(u) setUser(u);
                     setLoading(false);
                 });
             }, []);

             const handleUpdateUser = (updated) => { setUser(updated); };

             if (loading) return (
                <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-950 gap-6">
                    <span className="spinner"></span>
                    <div className="font-mono text-xs text-slate-500 tracking-[0.2em] animate-pulse">INITIALIZING SYSTEM...</div>
                </div>
             );

             if (!user) return <LoginScreen onLogin={setUser} />;

             return <Dashboard user={user} onLogout={async ()=>{await api.logout(); setUser(null);}} onUpdateUser={handleUpdateUser} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
